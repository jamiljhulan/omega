<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Watches | Omega Hub Online</title>
     <link rel="icon" href="images/favicon.png" type="image/png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Core Variables --- */
        :root {
            --fg-black: #0A0A0A;
            --fg-white: #FFFFFF;
            --fg-off-white: #FAFAFA;
            --fg-grey-light: #EAEAEA;
            --fg-grey: #666666;
            --fg-accent: #FF0055;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body { margin: 0; font-family: var(--font-sans); background-color: var(--fg-off-white); color: var(--fg-black); overflow-x: hidden; }

        /* --- Hero Banner --- */
        .category-hero { 
            position: relative; width: 100%; height: 50vh; min-height: 400px; 
            background-color: var(--fg-black); display: flex; align-items: center; 
            justify-content: center; text-align: center; overflow: hidden; padding-top: 80px; 
        }
        .category-hero img { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; opacity: 0.5; z-index: 1; 
        }
        .hero-content { position: relative; z-index: 2; color: var(--fg-white); padding: 0 5%; }
        .hero-tag { font-family: var(--font-sans); font-size: 0.85rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .hero-title { font-family: var(--font-serif); font-size: 4rem; font-weight: 400; margin: 0 0 20px 0; letter-spacing: -1px; }
        .hero-subtitle { font-family: var(--font-sans); font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: #E0E0E0; }

        /* --- Grid & Cards --- */
        .shop-section { padding: 60px 5% 100px; max-width: 1400px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; width: 100%; }

        .shop-card { background: var(--fg-white); display: flex; flex-direction: column; transition: transform 0.3s ease; position: relative; border: 1px solid var(--fg-grey-light); }
        .shop-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        
        .shop-card-image { position: relative; width: 100%; padding-top: 125%; background-color: #F8F8F8; overflow: hidden; }
        .shop-card-image img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; }
        .shop-card:hover .shop-card-image img { transform: scale(1.05); }

        .shop-card-content { padding: 20px 15px; display: flex; flex-direction: column; flex-grow: 1; text-align: center; }
        .shop-card-brand { font-size: 0.75rem; color: var(--fg-grey); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: 600; }
        .shop-card-title { font-family: var(--font-serif); font-size: 1.1rem; margin: 0 0 10px 0; color: var(--fg-black); }
        .shop-card-price { font-size: 1.15rem; font-weight: 700; color: var(--fg-black); margin-bottom: 15px; }

        .btn-dm { display: inline-block; padding: 12px 0; width: 100%; text-align: center; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--fg-black); background-color: transparent; color: var(--fg-black); transition: all 0.3s ease; cursor: pointer; }
        .btn-dm:hover { background-color: var(--fg-black); color: var(--fg-white); }

        /* --- Responsive --- */
        @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); } .hero-title { font-size: 3.5rem; } }
        @media (max-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } .hero-title { font-size: 2.8rem; } .category-hero { min-height: 350px; } .shop-card-title { font-size: 0.95rem; } .btn-dm { padding: 10px 0; font-size: 0.7rem;} }
    </style>
</head>
<body>

    <!-- Header Injection -->
    <div id="header-placeholder"></div>

    <!-- Category Hero Section -->
    <section class="category-hero">
        <img src="images/WATCHES/Cartier/Watches-cartier1.jpg" alt="Premium Horology Collection">
        <div class="hero-content">
            <span class="hero-tag">The Collection</span>
            <h1 class="hero-title">Luxury Watches</h1>
            <p class="hero-subtitle">Timeless horology statements. Explore iconic craftsmanship and high-end detailing designed to last a lifetime.</p>
        </div>
    </section>

    <!-- Dynamic Product Grid -->
    <section class="shop-section">
        <div class="product-grid" id="watches-grid">
            <!-- JavaScript will inject 20 watches here -->
        </div>
    </section>

    <!-- Footer Injection -->
    <div id="footer-placeholder"></div>

    <!-- External Scripts -->
    <script src="header.js"></script>
    <script src="footer.js"></script>

    <!-- ⚡ WATCHES GENERATOR SCRIPT ⚡ -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // 20 high-end watches selected from your actual folder structure
            const watchesArray = [
                "images/WATCHES/Cartier/Watches-cartier1.jpg",
                "images/WATCHES/Cartier/Watches-cartier3.jpg",
                "images/WATCHES/Cartier/Watches-cartier6.jpg",
                "images/WATCHES/Cartier/Watches-cartier10.jpg",
                "images/WATCHES/Cartier/Watches-cartier15.jpg",
                "images/WATCHES/Cartier/Watches-cartier19.jpg",
                "images/WATCHES/Cartier/Watches-cartier22.jpg",
                "images/WATCHES/Cartier/Watches-cartier25.jpg",
                "images/WATCHES/Dior/Watches-dior1.jpg",
                "images/WATCHES/Dior/Watches-dior3.jpg",
                "images/WATCHES/Dior/Watches-dior5.jpg",
                "images/WATCHES/Dior/Watches-dior6.jpg",
                "images/WATCHES/Hermes/Watches-hermes1.jpg",
                "images/WATCHES/Hermes/Watches-hermes2.jpg",
                "images/WATCHES/Patek-Philippe/Watches-PatekPhilippe1.jpg",
                "images/WATCHES/Patek-Philippe/Watches-PatekPhilippe3.jpg",
                "images/WATCHES/Patek-Philippe/Watches-PatekPhilippe5.jpg",
                "images/WATCHES/Patek-Philippe/Watches-PatekPhilippe7.jpg",
                "images/WATCHES/Patek-Philippe/Watches-PatekPhilippe9.jpg",
                "images/WATCHES/Patek-Philippe/Watches-PatekPhilippe10.jpg"
            ];

            const gridContainer = document.getElementById('watches-grid');
            let generatedHTML = "";

            watchesArray.forEach((imageSrc, index) => {
                
                // Parse brand identity based on folder naming logic
                let brandName = "Omega Hub Precision";
                if(imageSrc.includes("Cartier")) brandName = "Cartier";
                if(imageSrc.includes("Dior")) brandName = "Dior Horlogerie";
                if(imageSrc.includes("Hermes")) brandName = "Hermès";
                if(imageSrc.includes("Patek-Philippe")) brandName = "Patek Philippe";

                // Generate random pricing matched to the luxury watch tier ($800 - $1320)
                const randomPrice = Math.floor(Math.random() * (1320 - 800 + 1)) + 800;

                generatedHTML += `
                    <div class="shop-card">
                        <div class="shop-card-image">
                            <img src="${imageSrc}" alt="${brandName} Luxury Watch" loading="lazy">
                        </div>
                        <div class="shop-card-content">
                            <span class="shop-card-brand">${brandName}</span>
                            <h3 class="shop-card-title">Premium Timepiece</h3>
                            <div class="shop-card-price">$${randomPrice}</div>
                            <!-- Updated CTA point to Instagram link as requested -->
                            <a href="https://ig.me/m/omegahubonline" target="_blank" class="btn-dm">DM TO BUY</a>
                        </div>
                    </div>
                `;
            });

            // Inject all cards into container markup
            gridContainer.innerHTML = generatedHTML;
        });
    </script>
</body>
</html>
