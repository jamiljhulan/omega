<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New In | Omega Hub Online</title>
     <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Core Variables --- */
        :root {
            --fg-black: #0A0A0A;
            --fg-white: #FFFFFF;
            --fg-off-white: #FAFAFA;
            --fg-grey-light: #EAEAEA;
            --fg-grey: #666666;
            --fg-accent: #FF0055;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body { margin: 0; font-family: var(--font-sans); background-color: var(--fg-off-white); color: var(--fg-black); overflow-x: hidden; }

        /* --- Hero Banner --- */
        .new-in-hero { position: relative; width: 100%; height: 60vh; min-height: 500px; background-color: var(--fg-black); display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; padding-top: 80px; }
        .new-in-hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; z-index: 1; }
        .hero-content { position: relative; z-index: 2; color: var(--fg-white); padding: 0 5%; }
        .hero-tag { font-family: var(--font-sans); font-size: 0.85rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .hero-title { font-family: var(--font-serif); font-size: 4.5rem; font-weight: 400; margin: 0 0 20px 0; letter-spacing: -1px; }
        .hero-subtitle { font-family: var(--font-sans); font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: #E0E0E0; }

        /* --- Grid & Cards --- */
        .new-in-section { padding: 40px 5% 100px; max-width: 1400px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; width: 100%; }

        .shop-card { background: var(--fg-white); display: flex; flex-direction: column; transition: transform 0.3s ease; position: relative; border: 1px solid var(--fg-grey-light); }
        .shop-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        
        .shop-card-image { position: relative; width: 100%; padding-top: 125%; background-color: #F8F8F8; overflow: hidden; }
        .shop-card-image img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s ease; }
        .shop-card:hover .shop-card-image img { transform: scale(1.05); }

        .shop-badge { position: absolute; top: 15px; left: 15px; padding: 6px 12px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background-color: var(--fg-black); color: var(--fg-white); z-index: 2; }
        .badge-exclusive { background-color: var(--fg-accent); }

        .shop-card-content { padding: 20px 15px; display: flex; flex-direction: column; flex-grow: 1; text-align: center; }
        .shop-card-brand { font-size: 0.75rem; color: var(--fg-grey); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: 600; }
        .shop-card-title { font-family: var(--font-serif); font-size: 1.1rem; margin: 0 0 10px 0; color: var(--fg-black); }
        .shop-card-price { font-size: 1.15rem; font-weight: 700; color: var(--fg-black); margin-bottom: 15px; }

        .btn-dm { display: inline-block; padding: 12px 0; width: 100%; text-align: center; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--fg-black); background-color: transparent; color: var(--fg-black); transition: all 0.3s ease; cursor: pointer; }
        .btn-dm:hover { background-color: var(--fg-black); color: var(--fg-white); }

        /* --- Load More Button --- */
        .load-more-container { text-align: center; margin-top: 60px; }
        .btn-load-more { background-color: var(--fg-black); color: var(--fg-white); border: none; padding: 16px 50px; font-family: var(--font-sans); font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: background-color 0.3s ease; }
        .btn-load-more:hover { background-color: var(--fg-accent); }

        /* --- Responsive --- */
        @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); } .hero-title { font-size: 3.5rem; } }
        @media (max-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } .hero-title { font-size: 2.8rem; } .hero { min-height: 400px; } .shop-card-title { font-size: 0.95rem; } .btn-dm { padding: 10px 0; font-size: 0.7rem;} }
    </style>
</head>

            `;

            // 2. Format the list to be clean and web-safe
            const imageArray = rawImageList
                .trim()
                .split(/\r?\n/)
                .map(img => img.trim().replace(/\\/g, "/"))
                .filter(img => img !== "");

            // 3. Batching Engine Setup
            const gridContainer = document.getElementById('dynamic-product-grid');
            const loadMoreBtn = document.getElementById('btn-load-more');
            
            let currentIndex = 0;
            const itemsPerBatch = 24; // It will load 24 items every time you click

            // 4. The Function that loads the next 24 items
            function loadNextBatch() {
                // Get the next chunk of images from the massive array
                const batch = imageArray.slice(currentIndex, currentIndex + itemsPerBatch);
                let generatedHTML = "";

                batch.forEach((imageSrc, idx) => {
                    // Global index tracks exactly which number out of 1201 we are on
                    const globalIndex = currentIndex + idx; 
                    
                    const randomPrice = Math.floor(Math.random() * (1200 - 400 + 1)) + 400;
                    const badgeText = (globalIndex % 6 === 0) 
                        ? '<span class="shop-badge badge-exclusive">LIMITED EDITION</span>' 
                        : '<span class="shop-badge">NEW IN</span>';

                    generatedHTML += `
                        <div class="shop-card">
                            <div class="shop-card-image">
                                ${badgeText}
                                <img src="${imageSrc}" alt="Omega Hub Vault Piece ${globalIndex + 1}" loading="lazy">
                            </div>
                            <div class="shop-card-content">
                                <span class="shop-card-brand">Omega Hub Exclusive</span>
                                <h3 class="shop-card-title">Vault Piece #${globalIndex + 1}</h3>
                                <div class="shop-card-price">$${randomPrice}</div>
                                <a href="https://ig.me/m/omegahubonline?text=${encodeURIComponent(`I'm interested in Vault Piece #${globalIndex + 1}. Image: ${imageSrc}`)}" target="_blank" class="btn-dm">DM TO BUY</a>
                            </div>
                        </div>
                    `;
                });

                // Add the new HTML to the end of the grid, WITHOUT deleting the old items
                gridContainer.insertAdjacentHTML('beforeend', generatedHTML);
                
                // Move the index forward 24 spots
                currentIndex += itemsPerBatch;

                // If we have loaded all 1,201 images, hide the Load More button
                if (currentIndex >= imageArray.length) {
                    loadMoreBtn.style.display = 'none';
                }
            }

            // 5. Load the first 24 items immediately when the page opens
            loadNextBatch();

            // 6. Hook up the "Load More" button to fetch the next batch when clicked
            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', loadNextBatch);
            }
        });
    </script>
